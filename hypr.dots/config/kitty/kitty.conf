# Основные параметры
confirm_os_window_close 0
window_margin_width 18
background_opacity 0.92

# Шрифты и оформление
font_size 10
font_family JetBrainsMono NF
bold_font auto
italic_font auto
disable_ligatures never

# Цветовая схема (пример)
foreground #D8DEE9
background #1e1c24
color0 #3B4252
color1 #BF616A
color2 #A3BE8C
color3 #EBCB8B

# Прочее
cursor_shape beam
shell_integration no-cursor
copy_on_select yes

# Настройки курсора
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
# Включаем след курсора (число = количество "хвостов")
cursor_trail 10002

# Настройка затухания следа: (начальная прозрачность, конечная прозрачность)
cursor_trail_decay 0.1 0.6

# Минимальное расстояние перемещения для появления следа (в символах)
cursor_trail_start_threshold 2
zsh

map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
include current-theme.conf

include ~/.config/kitty/wal-colors.conf

# Уведомление, когда команда выполняется > 20 секунд и окно не в фокусе
notify_on_cmd_finish invisible 20

# Подсветка и кликабельность ссылок
url_color #2aa1ae
url_underline yes
open_url_with default
