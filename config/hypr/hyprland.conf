
  ########################
 ### переменные среды ###
########################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
#env = LIBVA_DRIVER_NAME,nvidia
#env = XDG_SESSION_TYPE,wayland #2D2E30;
#env = GBM_BACKEND,nvidia-drm
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

  ##############
 ## мониторы ##
##############

# See https://wiki.hypr.land/Configuring/Monitors/

monitor= HDMI-A-1, 1920x1080@165, 0x0, 1, transform, 2 # ВАЖНО уберите , transform, 2 и поставьте свой монитор в конфиг перед применением также герцовку поменять надо она @165 ставте свою максимальную

  ################
 ### програмы ###
################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$fileManager = kitty zsh -c "wal -i /home/hexov/Downloads/Untitled.jpg; clear; ranger; zsh"
$menu = rofi -show drun &
$browser = firefox
$telegram = Telegram-Desktop
$music = Dotify
$obs = obs
$geminicli = kitty --directory ~/geminicli zsh -c "gemini; zsh"
$note = obsidian
$ide = zed

  #################
 ### автострат ###
#################

# нужное

exec-once = swww-daemon --format argb & sleep 0.5 && swww img /home/hexov/Downloads/1.jpg # обои
exec-once = bash -c 'eww open bar_widget && eww update get_vol="$(pamixer --get-volume)" && ~/.config/eww/scripts/getvol.sh'   #запуск eww
exec-once = bash -c '~/.config/eww/scripts/workspace.sh'   # скрипт для eww
exec-once = sleep 2 # чтобы не было багов
exec-once = sleep 2 && hyprctl reloadconfig   # чтобы не было багов
exec-once = swaync   # уведомления

# приложения (можно менять)

exec-once = /home/hexov/hyprscene-gtk/target/release/hyprscene

  ###########
 ### вид ###
###########

# вообще можно менять но мне так вкатывает

general {
  gaps_in = 7   # под бар не трогать если не меняли бар
  gaps_out = 10   # под бар не трогать если не меняли бар
  border_size = 0
  resize_on_border = true
  allow_tearing = false

  layout = dwindle
}

decoration {
  rounding = 7   # под бар не трогать если не меняли бар

  active_opacity = 0.92
  inactive_opacity =0.89

  shadow {
    enabled = true
    range = 15
    render_power = 10
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 5
    passes = 3
    vibrancy = 0.3
    xray = true
    #popups = true
  }

  dim_special = 0.3
}

  ##############
 ## анимации ##
##############

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, once
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

  ############
 ### ввод ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:lalt_lshift_toggle
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

#utps://wiki.hypr.land/Configuring/Variables/#gestures

#gestures {
 #   workspace_swipe = true
#}

# Example per-device config

# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
  ###########
 ## бинды ##
###########

$mainMod = SUPER # win

# открытие приложений

bind = $mainMod, t, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, N, exec, $note
bind = $mainMod, B, exec, $browser
bind = $mainMod, L, exec, $music
bind = $mainMod, N, exec, $note
bind = $mainMod, B, exec, $browser
bind = $mainMod, L, exec, $music
bind = $mainMod, O, exec, $obs
bind = $mainMod, x, exec, $geminicli
bind = $mainMod, I, exec, $ide
bind = $mainMod  SHIFT, T, exec, $telegram
bind = $mainMod  SHIFT, I, exec, ~/.config/hypr/sakoora.hyprlock/hyprlock-run/panels && hyprlock --grace 5

# работа с окнами

bind = $mainMod, q, killactive,
bind = $mainMod, F, fullscreen, 0 #fulscreen to entire screen
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = SUPER, a, movefocus, l
bind = SUPER, s, movefocus, d
bind = SUPER, w, movefocus, u
bind = SUPER, d, movefocus, r

# смена воркспейсов

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# перемещения окон на воркспейс

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# перемещение ресайз окон мышкой

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# лаптопное упровление громкостью и яркостью

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

